spring:
  application:
    name: trading-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3330/trading_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:HKtv2014}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

trading:
  timezone: ${TRADING_TIMEZONE:Asia/Taipei}
  line:
    enabled: ${LINE_ENABLED:false}
    token: ${LINE_TOKEN:}
    channel-access-token: ${LINE_CHANNEL_ACCESS_TOKEN:${LINE_TOKEN:}}
    to: ${LINE_TO:}
    push-url: ${LINE_PUSH_URL:https://api.line.me/v2/bot/message/push}
  scheduler:
    hourly-gate:
      enabled: false
    hourly-gate-cron: "0 5 10-13 * * MON-FRI"
    final-decision:
      enabled: false
    final-decision-cron: "0 30 9 * * MON-FRI"
    five-minute-monitor:
      enabled: false
    five-minute-monitor-cron: "0 */5 9-13 * * MON-FRI"
    premarket-notify:
      enabled: false
    premarket-notify-cron: "0 30 8 * * MON-FRI"
    aftermarket-review:
      enabled: false
    aftermarket-review-cron: "0 0 14 * * MON-FRI"
    postmarket-analysis:
      enabled: false
    postmarket-analysis-cron: "0 30 15 * * MON-FRI"
    premarket-data-prep:
      enabled: false
    premarket-data-prep-cron: "0 10 8 * * MON-FRI"
    postmarket-data-prep:
      enabled: false
    postmarket-data-prep-cron: "0 5 15 * * MON-FRI"
    t86-data-prep:
      enabled: false
    t86-data-prep-cron: "0 10 18 * * MON-FRI"
    midday-review:
      enabled: false
    midday-review-cron: "0 0 11 * * MON-FRI"
    tomorrow-plan:
      enabled: false
    tomorrow-plan-cron: "0 30 18 * * MON-FRI"
    open-data-prep:
      enabled: false
    open-data-prep-cron: "0 1 9 * * MON-FRI"
    external-probe-health:
      enabled: false
    external-probe-health-cron: "0 25 8,15 * * MON-FRI"
    watchlist-refresh:
      enabled: false
    watchlist-refresh-cron: "0 35 15 * * MON-FRI"
    weekly-trade-review:
      enabled: false
    weekly-trade-review-cron: "0 0 19 * * FRI"
    daily-health-check:
      enabled: false
    daily-health-check-cron: "0 0 8 * * MON-FRI"

  taifex:
    base-url: ${TAIFEX_BASE_URL:https://openapi.taifex.com.tw}

  ai:
    claude:
      research-output-path: ${CLAUDE_RESEARCH_OUTPUT_PATH:}
      request-output-path: ${CLAUDE_REQUEST_OUTPUT_PATH:}

  claude-submit:
    enabled: ${CLAUDE_SUBMIT_BRIDGE_ENABLED:true}
    watch-dir: ${CLAUDE_SUBMIT_WATCH_DIR:D:/ai/stock/claude-submit}
    scan-interval-ms: 30000
