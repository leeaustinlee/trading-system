<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0B0F1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trading">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
<!-- Google Fonts: 中文 Noto Sans TC + 拉丁 Inter + 等寬 JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700;800;900&display=swap">
<title>Trading Terminal · Mobile</title>
<style>
  /* ════════════════════════════════════════════════════════════
     Trading Terminal · Mobile  v2 (style upgrade 2026-04-26)
     深色 trading terminal 風格 + 三層字級 + 漸層 / glow / pulse
  ════════════════════════════════════════════════════════════ */
  :root{
    /* 背景：deep navy black + 卡片漸進 */
    --bg-base:#0B0F1A;
    --bg-card:#111827;
    --bg-card-2:#1E293B;
    --bg-card-3:#27324A;
    --bg-sticky:rgba(11,15,26,.88);

    /* 卡片表面光：subtle inner sheen */
    --card-edge: 0 0 0 1px rgba(255,255,255,.04), 0 1px 0 rgba(255,255,255,.05) inset, 0 6px 18px rgba(0,0,0,.45);
    --card-edge-hover: 0 0 0 1px rgba(99,102,241,.22), 0 1px 0 rgba(255,255,255,.06) inset, 0 8px 24px rgba(0,0,0,.55);

    /* 文字 */
    --ink:#F1F5F9;
    --ink-2:#CBD5E1;
    --muted:#94A3B8;
    --dim:#64748B;
    --line:rgba(148,163,184,.10);

    /* 語意色（更鮮、偏 neon） */
    --c-buy:#22DD7A;       --c-buy-bg:rgba(34,221,122,.14);  --c-buy-border:rgba(34,221,122,.55);  --c-buy-glow:rgba(34,221,122,.45);
    --c-wait:#FACC15;      --c-wait-bg:rgba(250,204,21,.13); --c-wait-border:rgba(250,204,21,.55); --c-wait-glow:rgba(250,204,21,.40);
    --c-watch:#60A5FA;     --c-watch-bg:rgba(96,165,250,.13);--c-watch-border:rgba(96,165,250,.55);--c-watch-glow:rgba(96,165,250,.40);
    --c-plan:#A78BFA;      --c-plan-bg:rgba(167,139,250,.14);--c-plan-border:rgba(167,139,250,.55);--c-plan-glow:rgba(167,139,250,.40);
    --c-rest:#64748B;      --c-rest-bg:rgba(100,116,139,.16);--c-rest-border:rgba(100,116,139,.45);--c-rest-glow:rgba(100,116,139,.30);
    --c-stop:#F43F5E;      --c-stop-bg:rgba(244,63,94,.16);  --c-stop-border:rgba(244,63,94,.6);   --c-stop-glow:rgba(244,63,94,.50);
    --c-up:#22DD7A; --c-dn:#F43F5E;

    /* accent gradient for hero / active tab */
    --grad-hero: linear-gradient(135deg, rgba(99,102,241,.10) 0%, rgba(20,184,166,.06) 50%, rgba(99,102,241,.04) 100%);
    --grad-tab-active: linear-gradient(180deg, rgba(34,221,122,.18) 0%, rgba(34,221,122,.04) 100%);

    /* radius / spacing — bumped */
    --r:16px; --r-sm:10px; --r-pill:999px;
    --sp-1:4px; --sp-2:10px; --sp-3:14px; --sp-4:18px; --sp-5:24px; --sp-6:32px;
    --tap:44px;

    /* fonts */
    --f-sans:"Inter","Noto Sans TC",-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    --f-mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg-base);color:var(--ink);
    font:500 16px/1.5 var(--f-sans);
    overscroll-behavior-y:contain;overflow-x:hidden;
    text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{padding-bottom:calc(76px + env(safe-area-inset-bottom,0))}
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
    background:
      radial-gradient(900px 380px at 100% -10%, rgba(99,102,241,.10), transparent 60%),
      radial-gradient(900px 600px at -10% 120%, rgba(20,184,166,.06), transparent 60%);
  }
  .mono{font-family:var(--f-mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum","ss01"}
  .num{font-family:var(--f-mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
  a{color:inherit;text-decoration:none}

  /* ─── header / page title bar ───────────────────────────────── */
  .m-header{position:sticky;top:0;z-index:30;background:var(--bg-sticky);
    backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);
    padding:max(env(safe-area-inset-top),10px) var(--sp-4) 0;
    border-bottom:1px solid var(--line)}
  .m-header .row{display:flex;align-items:center;justify-content:space-between;height:44px}
  .m-header .title{font-size:16px;font-weight:800;letter-spacing:.6px}
  .m-header .right{display:flex;gap:10px;align-items:center;font-size:12px;color:var(--muted)}
  .m-header .refresh{padding:6px 14px;border-radius:var(--r-pill);
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
    color:var(--ink-2);border:1px solid rgba(255,255,255,.10);font-size:12px;
    min-height:34px;font-weight:600;letter-spacing:.5px;transition:transform .15s, background .15s}
  .m-header .refresh:active{transform:scale(.96);background:var(--bg-card-2)}

  /* ─── decision hero ─────────────────────────────────────────── */
  .hero{padding:var(--sp-3) var(--sp-4) var(--sp-3)}
  .hero-inner{position:relative;border-radius:var(--r);
    padding:var(--sp-4) var(--sp-4) var(--sp-3);
    background: var(--bg-card), var(--grad-hero);
    background:linear-gradient(135deg, rgba(99,102,241,.10), rgba(20,184,166,.04) 60%, rgba(99,102,241,.02)), var(--bg-card);
    border-left:5px solid var(--c-rest);
    box-shadow: var(--card-edge);
    transition:border-color .25s, box-shadow .25s}
  .hero-inner::after{
    content:"";position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:5px 0 0 5px;
    background:var(--c-rest);opacity:.0;
    box-shadow: 0 0 18px var(--c-rest-glow);
  }
  .hero[data-d=ENTER] .hero-inner{border-left-color:var(--c-buy)}
  .hero[data-d=ENTER] .hero-inner::after{background:var(--c-buy);box-shadow:0 0 22px var(--c-buy-glow);opacity:1}
  .hero[data-d=WAIT]  .hero-inner,.hero[data-d=WATCH] .hero-inner{border-left-color:var(--c-wait)}
  .hero[data-d=WAIT]  .hero-inner::after,.hero[data-d=WATCH] .hero-inner::after{background:var(--c-wait);box-shadow:0 0 22px var(--c-wait-glow);opacity:1}
  .hero[data-d=PLAN]  .hero-inner{border-left-color:var(--c-plan)}
  .hero[data-d=PLAN]  .hero-inner::after{background:var(--c-plan);box-shadow:0 0 22px var(--c-plan-glow);opacity:1}
  .hero[data-d=ALERT] .hero-inner{border-left-color:var(--c-stop)}
  .hero[data-d=ALERT] .hero-inner::after{background:var(--c-stop);box-shadow:0 0 22px var(--c-stop-glow);opacity:1}
  .hero[data-d=ENTER] .hero-inner{animation:heroPulse 3.2s ease-in-out infinite}
  .hero[data-d=ALERT] .hero-inner{animation:heroPulse 1.6s ease-in-out infinite}
  @keyframes heroPulse{
    0%,100%{box-shadow: var(--card-edge)}
    50%   {box-shadow: var(--card-edge), 0 0 28px var(--c-buy-glow, rgba(34,221,122,.30))}
  }
  .hero[data-d=ALERT] .hero-inner{animation-name:heroPulseAlert}
  @keyframes heroPulseAlert{
    0%,100%{box-shadow: var(--card-edge)}
    50%   {box-shadow: var(--card-edge), 0 0 28px var(--c-stop-glow)}
  }
  .hero h1{margin:0;font-size:28px;font-weight:900;letter-spacing:.5px;line-height:1.2;
    display:flex;align-items:baseline;gap:10px}
  .hero h1 .count{font-size:14px;color:var(--muted);font-weight:600;letter-spacing:.5px}
  .hero .reason{margin-top:8px;color:var(--ink-2);font-size:15px;font-weight:600;line-height:1.4}
  .hero .meta{margin-top:8px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;
    letter-spacing:.4px;text-transform:uppercase;font-weight:700}
  .hero .topblocks{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);display:none}
  .hero[data-expanded=true] .topblocks{display:block}
  .hero .topblocks ol{margin:0;padding-left:20px;font-size:13px;color:var(--ink-2)}
  .hero .topblocks li{margin:3px 0;line-height:1.4}
  .hero .chev{float:right;color:var(--muted);font-size:12px;margin-top:-26px;font-weight:700}

  /* ─── ai status pill row (neon outline) ─────────────────────── */
  .ai-status{padding:8px var(--sp-4);font-size:12px;color:var(--muted);
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:space-between}
  .ai-status .pills{display:flex;gap:8px;flex-wrap:wrap}
  .ai-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--r-pill);
    font:700 11px/1 var(--f-sans);letter-spacing:.6px;text-transform:uppercase;
    background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);color:var(--ink-2);
    transition:box-shadow .2s, background .2s}
  .ai-pill::before{
    content:"";width:6px;height:6px;border-radius:50%;background:currentColor;
    box-shadow:0 0 8px currentColor;
  }
  .ai-pill.ok    {background:var(--c-buy-bg); border-color:var(--c-buy-border); color:#7BF1AB; box-shadow: 0 0 0 1px var(--c-buy-border) inset, 0 0 16px rgba(34,221,122,.18)}
  .ai-pill.warn  {background:var(--c-wait-bg);border-color:var(--c-wait-border);color:#FDE68A; box-shadow: 0 0 0 1px var(--c-wait-border) inset, 0 0 16px rgba(250,204,21,.18)}
  .ai-pill.alert {background:var(--c-stop-bg);border-color:var(--c-stop-border);color:#FDA4AF; box-shadow: 0 0 0 1px var(--c-stop-border) inset, 0 0 16px rgba(244,63,94,.20);
                  animation:pillPulse 1.4s ease-in-out infinite}
  @keyframes pillPulse{
    0%,100%{box-shadow:0 0 0 1px var(--c-stop-border) inset, 0 0 12px rgba(244,63,94,.18)}
    50%   {box-shadow:0 0 0 1px var(--c-stop-border) inset, 0 0 22px rgba(244,63,94,.40)}
  }

  /* ─── status badge / risk badge / hint pill (component) ─────── */
  .badge{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--r-pill);
    font:800 11px/1 var(--f-sans);letter-spacing:.6px;text-transform:uppercase;line-height:1.1;
    transition:box-shadow .2s}
  .badge.buy   {background:var(--c-buy-bg);  color:#7BF1AB;border:1px solid var(--c-buy-border);   box-shadow:0 0 12px rgba(34,221,122,.15)}
  .badge.wait  {background:var(--c-wait-bg); color:#FDE68A;border:1px solid var(--c-wait-border);  box-shadow:0 0 12px rgba(250,204,21,.13)}
  .badge.watch {background:var(--c-watch-bg);color:#93C5FD;border:1px solid var(--c-watch-border); box-shadow:0 0 12px rgba(96,165,250,.13)}
  .badge.plan  {background:var(--c-plan-bg); color:#C4B5FD;border:1px solid var(--c-plan-border);  box-shadow:0 0 12px rgba(167,139,250,.13)}
  .badge.rest  {background:var(--c-rest-bg); color:#CBD5E1;border:1px solid var(--c-rest-border)}
  .badge.stop  {background:var(--c-stop-bg); color:#FDA4AF;border:1px solid var(--c-stop-border);  box-shadow:0 0 14px rgba(244,63,94,.18); animation:pillPulse 1.6s ease-in-out infinite}
  .badge.skip  {background:rgba(100,116,139,.18);color:#94A3B8;border:1px solid rgba(100,116,139,.45)}

  /* ─── nav chips (filter / horizontal scroll) ────────────────── */
  .chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
    padding:8px var(--sp-4) 12px;background:transparent}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;height:38px;padding:0 16px;border-radius:var(--r-pill);
    background:rgba(255,255,255,.03);color:var(--muted);
    font:700 13px/1 var(--f-sans);letter-spacing:.4px;
    border:1px solid rgba(255,255,255,.08);min-width:64px;
    transition:background .15s, color .15s, transform .12s, box-shadow .15s}
  .chip:active{transform:scale(.97)}
  .chip.active{background:linear-gradient(180deg, var(--ink) 0%, #DCE6F4 100%);
    color:var(--bg-base);border-color:var(--ink);
    box-shadow:0 4px 14px rgba(241,245,249,.18)}
  .chip .badge-num{margin-left:6px;font-size:11px;color:inherit;opacity:.7;font-family:var(--f-mono)}

  /* ─── content / card base ───────────────────────────────────── */
  main{padding:0 var(--sp-4)}
  .section{margin-top:var(--sp-4)}
  .section-title{margin:0 0 var(--sp-2);color:var(--muted);font-size:11px;font-weight:800;
    letter-spacing:.8px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
  .section-title .count{color:var(--dim);font-family:var(--f-mono)}

  .card{position:relative;background:var(--bg-card);border-radius:var(--r);
    padding:var(--sp-4);margin-bottom:var(--sp-2);
    box-shadow: var(--card-edge);
    transition:transform .15s ease, box-shadow .2s ease, background .15s}
  .card:active{transform:scale(.985);background:var(--bg-card-2)}
  @media (hover:hover){
    .card:hover{box-shadow:var(--card-edge-hover);transform:translateY(-1px)}
  }
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:24px var(--sp-4);
    background:var(--bg-card);border-radius:var(--r);border:1px dashed var(--line)}
  .skel{background:linear-gradient(90deg,var(--bg-card),var(--bg-card-2),var(--bg-card));
    background-size:200% 100%;animation:skel 1.4s linear infinite;border-radius:var(--r);
    height:18px;margin:4px 0}
  @keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* status accent column (left side bar) — applied by hint class on card */
  .a-card, .p-card{padding-left:calc(var(--sp-4) + 6px)}
  .a-card::before, .p-card::before{
    content:"";position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 4px 4px 0;
    background:var(--c-rest);opacity:.5;transition:background .2s, box-shadow .2s, opacity .2s
  }
  .a-card[data-hint=buy]::before  {background:var(--c-buy);opacity:1; box-shadow:0 0 14px var(--c-buy-glow)}
  .a-card[data-hint=wait]::before {background:var(--c-wait);opacity:1;box-shadow:0 0 14px var(--c-wait-glow)}
  .a-card[data-hint=watch]::before{background:var(--c-watch);opacity:1;box-shadow:0 0 14px var(--c-watch-glow)}
  .a-card[data-hint=skip]::before {background:var(--c-rest);opacity:.4}
  .p-card[data-risk=danger]::before{background:var(--c-stop);opacity:1;box-shadow:0 0 14px var(--c-stop-glow)}
  .p-card[data-risk=warn]::before  {background:var(--c-wait);opacity:1;box-shadow:0 0 14px var(--c-wait-glow)}
  .p-card[data-risk=safe]::before  {background:var(--c-buy);opacity:1; box-shadow:0 0 14px var(--c-buy-glow)}

  /* ─── action card (candidates / overview) ───────────────────── */
  .a-card .row1{display:flex;align-items:baseline;justify-content:space-between;gap:10px;min-width:0}
  .a-card .row1 > div{min-width:0;overflow:hidden}
  .a-card .row1 .badge{flex-shrink:0}
  .a-card .sym{font:800 20px/1.2 var(--f-mono);letter-spacing:.5px;color:var(--ink)}
  .a-card .name{color:var(--ink-2);font-size:14px;margin-left:8px;font-weight:600}
  .a-card .quote{font-size:13px;color:var(--muted);margin-top:4px;font-family:var(--f-mono);font-variant-numeric:tabular-nums}
  .a-card .quote .px{color:var(--ink);font-weight:700;font-size:15px}
  .a-card .quote .up{color:var(--c-up);font-weight:700} .a-card .quote .dn{color:var(--c-dn);font-weight:700}
  .a-card .data{margin-top:var(--sp-3);display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:14px;align-items:baseline}
  .a-card .data .k{color:var(--muted);font-weight:600;font-size:12px;letter-spacing:.4px;text-transform:uppercase}
  .a-card .data .v{font-family:var(--f-mono);font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);text-align:right}
  .a-card .more{display:none;margin-top:var(--sp-3);padding-top:var(--sp-3);border-top:1px solid var(--line);
    font-size:13px;color:var(--muted)}
  .a-card.exp .more{display:block}
  .a-card .more .meta-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:6px;font-size:12px}
  .a-card .more .meta-row .v{color:var(--ink);font-weight:700;font-family:var(--f-mono)}

  /* dist (距停損) — text + inline 8-segment bar */
  .dist{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-family:var(--f-mono)}
  .dist .dist-text{min-width:64px;text-align:right}
  .dist.danger{color:var(--c-stop)}
  .dist.warn  {color:var(--c-wait)}
  .dist.safe  {color:var(--c-buy)}
  .dist.dim   {color:var(--muted)}
  .dist-seg{display:inline-grid;grid-template-columns:repeat(8, 6px);gap:2px;align-items:center;height:10px}
  .dist-seg > i{display:block;width:6px;height:10px;border-radius:1px;background:rgba(148,163,184,.18)}
  .dist.safe   .dist-seg > i.on{background:var(--c-buy);  box-shadow:0 0 6px var(--c-buy-glow)}
  .dist.warn   .dist-seg > i.on{background:var(--c-wait); box-shadow:0 0 6px var(--c-wait-glow)}
  .dist.danger .dist-seg > i.on{background:var(--c-stop); box-shadow:0 0 6px var(--c-stop-glow)}
  .dist.dim    .dist-seg > i.on{background:var(--muted)}

  /* ─── position card ─────────────────────────────────────────── */
  .p-card .row1{display:flex;align-items:baseline;justify-content:space-between;gap:10px;min-width:0}
  .p-card .row1 > div{min-width:0;overflow:hidden}
  .p-card .row1 .pnl{flex-shrink:0}
  .p-card .sym{font:800 20px/1.2 var(--f-mono);letter-spacing:.5px;color:var(--ink)}
  .p-card .name{color:var(--ink-2);font-size:14px;margin-left:8px;font-weight:600}
  .p-card .pnl{font-family:var(--f-mono);font-weight:800;font-size:22px;font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .p-card .pnl.up{color:var(--c-up)} .p-card .pnl.dn{color:var(--c-dn)}
  .p-card .info{font:500 13px/1.4 var(--f-mono);color:var(--muted);margin-top:4px;font-variant-numeric:tabular-nums}
  .p-card .stop-row{display:flex;align-items:center;gap:10px;margin-top:var(--sp-3);font-size:12px}
  .p-card .stop-row .label{color:var(--muted);min-width:54px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;font-size:11px}
  .stop-bar{position:relative;flex:1;height:8px;border-radius:6px;background:rgba(148,163,184,.10);overflow:hidden;border:1px solid rgba(148,163,184,.10)}
  .stop-bar > span{position:absolute;left:0;top:0;bottom:0;border-radius:6px;transition:width .25s ease}
  .stop-bar.danger > span{background:linear-gradient(90deg, var(--c-stop) 0%, #FB7185 100%);box-shadow:0 0 12px var(--c-stop-glow)}
  .stop-bar.warn   > span{background:linear-gradient(90deg, var(--c-wait) 0%, #FDE68A 100%);box-shadow:0 0 12px var(--c-wait-glow)}
  .stop-bar.safe   > span{background:linear-gradient(90deg, var(--c-buy)  0%, #6EE7B7 100%);box-shadow:0 0 12px var(--c-buy-glow)}
  .p-card .risk{font-size:12px;color:var(--muted);margin-top:6px;letter-spacing:.3px}
  .p-card .risk b{font-weight:800}
  .p-card .risk b.danger{color:var(--c-stop)}
  .p-card .risk b.warn{color:var(--c-wait)}
  .p-card .risk b.safe{color:var(--c-buy)}
  .p-card .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:var(--sp-3)}
  .p-card .actions button{height:var(--tap);border-radius:10px;font:700 13px/1 var(--f-sans);
    background:rgba(255,255,255,.03);color:var(--ink-2);border:1px solid rgba(255,255,255,.08);
    transition:transform .12s, box-shadow .15s, background .15s}
  .p-card .actions button:active{transform:scale(.96)}
  .p-card .actions button.hold  {background:var(--c-buy-bg); color:#7BF1AB;border-color:var(--c-buy-border); box-shadow:0 0 14px rgba(34,221,122,.10)}
  .p-card .actions button.add   {background:var(--c-watch-bg);color:#93C5FD;border-color:var(--c-watch-border);box-shadow:0 0 14px rgba(96,165,250,.10)}
  .p-card .actions button.reduce{background:var(--c-wait-bg); color:#FDE68A;border-color:var(--c-wait-border); box-shadow:0 0 14px rgba(250,204,21,.10)}

  .p-card .more{display:none;margin-top:var(--sp-3);padding-top:var(--sp-3);border-top:1px solid var(--line);font-size:13px;color:var(--muted)}
  .p-card.exp .more{display:block}

  /* ─── timeline / activity feed ──────────────────────────────── */
  .timeline-day{margin:18px 0 8px;font:800 11px/1 var(--f-sans);color:var(--muted);

  .tl-item{position:relative;padding:14px 14px 14px 32px;background:var(--bg-card);

    transition:box-shadow .2s, transform .12s}
  .tl-item:active{transform:scale(.99)}
  .tl-item::before{content:"";position:absolute;left:14px;top:18px;width:10px;height:10px;

  .tl-item[data-d=ENTER]::before{background:var(--c-buy);box-shadow:0 0 0 3px rgba(34,221,122,.18), 0 0 12px var(--c-buy-glow)}
  .tl-item[data-d=WAIT]::before,.tl-item[data-d=WATCH]::before{background:var(--c-wait);box-shadow:0 0 0 3px rgba(250,204,21,.18), 0 0 12px var(--c-wait-glow)}
  .tl-item[data-d=REST]::before{background:var(--c-rest);box-shadow:0 0 0 3px rgba(100,116,139,.18)}
  .tl-item[data-d=PLAN]::before{background:var(--c-plan);box-shadow:0 0 0 3px rgba(167,139,250,.18), 0 0 12px var(--c-plan-glow)}
  .tl-item.latest{background:linear-gradient(135deg, rgba(34,221,122,.06), transparent 60%), var(--bg-card);
    box-shadow:var(--card-edge), 0 0 0 1px rgba(34,221,122,.25)}
  .tl-item .head{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .tl-item .ts{font-size:11px;color:var(--muted);font-family:var(--f-mono);letter-spacing:.4px}
  .tl-item .body{font-size:14px;color:var(--ink);margin-top:4px;line-height:1.5}
  .tl-item .sub{font-size:12px;color:var(--muted);margin-top:4px;font-family:var(--f-mono);font-variant-numeric:tabular-nums}

  /* ─── metric strip (pnl summary) ────────────────────────────── */
  .metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:var(--sp-4)}
  .metric{background:var(--bg-card);border-radius:var(--r);padding:14px 16px;
    box-shadow: var(--card-edge);transition:box-shadow .2s}
  .metric .k{font-size:11px;color:var(--muted);font-weight:800;letter-spacing:.7px;text-transform:uppercase}
  .metric .v{font:800 22px/1.2 var(--f-mono);font-variant-numeric:tabular-nums;margin-top:6px;letter-spacing:.5px;color:var(--ink)}
  .metric .v.up{color:var(--c-up)} .metric .v.dn{color:var(--c-dn)}
  .metric .sub{font-size:11px;color:var(--dim);margin-top:4px;font-family:var(--f-mono);font-variant-numeric:tabular-nums}

  /* ─── collapsible section ──────────────────────────────────── */
  .collapsible{background:var(--bg-card);border-radius:var(--r);margin-bottom:10px;overflow:hidden;
    box-shadow: var(--card-edge)}
  .collapsible > .head{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;
    cursor:pointer;font:700 14px/1.3 var(--f-sans);min-height:var(--tap);letter-spacing:.3px}
  .collapsible > .head .chev{font-size:11px;color:var(--muted);transition:transform .25s}
  .collapsible.open > .head .chev{transform:rotate(180deg)}
  .collapsible > .body{display:none;padding:0 18px 14px;font-size:13px;color:var(--muted);border-top:1px solid var(--line)}
  .collapsible.open > .body{display:block;padding-top:12px}
  .collapsible pre{white-space:pre-wrap;word-break:break-word;background:var(--bg-card-2);
    padding:10px;border-radius:8px;font:500 11px/1.6 var(--f-mono);max-height:280px;overflow:auto;color:var(--ink-2)}

  /* ─── capital strip ─────────────────────────────────────────── */
  .capital{margin-top:var(--sp-4);background:var(--bg-card);border-radius:var(--r);
    padding:14px 18px;font-size:12px;color:var(--muted);
    display:grid;grid-template-columns:auto 1fr auto 1fr auto 1fr;gap:6px 14px;align-items:baseline;
    box-shadow:var(--card-edge);
    letter-spacing:.4px;text-transform:uppercase;font-weight:700}
  .capital .v{color:var(--ink);font-weight:800;font-family:var(--f-mono);font-variant-numeric:tabular-nums;
    text-align:right;text-transform:none;letter-spacing:0;font-size:14px}
  .capital .v.up{color:var(--c-up)} .capital .v.dn{color:var(--c-dn)}
  .theme-exposure{display:none;grid-column:1/-1;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);
    font-size:12px;text-transform:none;letter-spacing:0;font-weight:500}
  .theme-exposure .row{display:flex;justify-content:space-between;margin:3px 0;color:var(--ink-2)}
  .theme-exposure .row b{font-family:var(--f-mono);font-weight:700}
  .theme-exposure .row b.over{color:var(--c-stop)}
  .theme-exposure .row b.warn{color:var(--c-wait)}
  .capital.exp .theme-exposure{display:block}

  /* ─── scheduler row ─────────────────────────────────────────── */
  .sched-card{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
  .sched-card .sub{grid-column:1/-1;font:500 11px/1.4 var(--f-mono);color:var(--muted);font-variant-numeric:tabular-nums}
  .sched-card .name{font:700 14px/1.3 var(--f-sans);color:var(--ink)}
  .sched-card .badge{font-size:10px}
  .sched-card.fail{box-shadow:var(--card-edge), 0 0 0 1px var(--c-stop-border)}
  .sched-card.warn{box-shadow:var(--card-edge), 0 0 0 1px var(--c-wait-border)}

  /* ─── bottom tab bar ────────────────────────────────────────── */
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:var(--bg-sticky);
    backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);
    border-top:1px solid var(--line);
    padding:8px env(safe-area-inset-right,0) calc(env(safe-area-inset-bottom,0) + 8px) env(safe-area-inset-left,0)}
  .tabbar-scroll{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:0 10px}
  .tabbar-scroll::-webkit-scrollbar{display:none}
  .tab{position:relative;flex-shrink:0;min-width:64px;min-height:56px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    padding:6px 12px;border-radius:12px;color:var(--muted);
    font:700 11px/1 var(--f-sans);letter-spacing:.4px;
    transition:color .15s, background .15s}
  .tab .ico{font-size:22px;line-height:1;font-weight:600;letter-spacing:0}
  .tab.active{color:var(--ink);background:var(--grad-tab-active);
    box-shadow:0 0 0 1px var(--c-buy-border) inset, 0 0 18px rgba(34,221,122,.10)}
  .tab.active::before{
    content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);
    width:28px;height:3px;border-radius:0 0 4px 4px;
    background:var(--c-buy);box-shadow:0 0 10px var(--c-buy-glow)
  }
  .tab.active .ico{color:var(--c-buy);text-shadow:0 0 14px var(--c-buy-glow)}

  /* ─── shared: error / loading helpers ───────────────────────── */
  .err{color:var(--c-stop);font-size:11px;margin-top:4px}
  .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .grow{flex:1;min-width:0}

  /* ─── value transition：dataset 換值時 .v 用 0.2s opacity 漸變（不過度） */
  .v, .pnl, .num, .mono { transition: color .15s ease }
</style>

<body>

      <span class="mono" id="hdrTime">--:--:--</span>

<main id="app"><!-- view rendered here --></main>

<nav class="tabbar" aria-label="主選單">
  <div class="tabbar-scroll" id="tabbarScroll">
    <a class="tab" data-r="overview"  href="#/overview"><span class="ico">⊙</span><span>總覽</span></a>

    <a class="tab" data-r="advanced"  href="#/advanced"><span class="ico">⚙</span><span>進階</span></a>
  </div>

<script>
'use strict';
/* ════════════════════════════════════════════════════════════════
   utils
════════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const el = (tag, attrs={}, kids=[]) => {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})){
    if (k==='class') e.className=v;
    else if (k==='html') e.innerHTML=v;
    else if (k==='text') e.textContent=v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==='dataset') for (const [dk,dv] of Object.entries(v)) e.dataset[dk]=dv;
    else if (v!=null) e.setAttribute(k,v);
  }
  (Array.isArray(kids)?kids:[kids]).filter(x=>x!=null).forEach(k => e.append(k));
  return e;
};
const fmt    = (n,d=0)=> n==null||!isFinite(+n) ? '—' : Number(n).toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d});
const fmtPct = (n,d=1)=> n==null||!isFinite(+n) ? '—' : (n>=0?'+':'')+Number(n).toFixed(d)+'%';
const fmtPrice = n => n==null||!isFinite(+n) ? '—' : Number(n).toLocaleString('en-US',{maximumFractionDigits:2});
const truncate = (s,n)=> !s?'': (String(s).length>n ? String(s).slice(0,n)+'…' : String(s));
const HHmm   = iso => { if(!iso) return '--:--'; try{return new Date(iso).toTimeString().slice(0,5);}catch(e){return '--:--';} };
const HHmmss = iso => { if(!iso) return '--:--:--'; try{return new Date(iso).toTimeString().slice(0,8);}catch(e){return '--:--:--';} };
const yyyymmdd = iso => { if(!iso) return ''; try{return new Date(iso).toISOString().slice(0,10);}catch(e){return '';} };
const safeJson = s => { try{ return s?JSON.parse(s):{}; }catch(e){ return {}; } };

async function safeFetch(url){
  try{
    const r = await fetch(url,{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){ console.warn('fetch fail',url,e.message); return null; }
}

/* ════════════════════════════════════════════════════════════════
   global state + cache
════════════════════════════════════════════════════════════════ */
const S = {
  dashboard:null, candidates:[], positions:[], capital:null, quotes:{},
  pnlDaily:null, pnl20:null, pnl90:null,
  decisionsHistory:null, hourlyHistory:null, monitorHistory:null,
  notifications:null, schedulerJobs:null, scheduledTasks:null,
  migrationHealth:null, themeMappings:null,
  filter:'all',
  lastFetchAt:null,
};
S.filter = (localStorage.getItem('mobile.filter') || 'all');

/* ════════════════════════════════════════════════════════════════
   classification helpers
════════════════════════════════════════════════════════════════ */
function classifyCandidate(c, quote){
  if (c.isVetoed) return {cls:'skip', label:'⚫ 排除', code:'SKIP'};
  const score = Number(c.finalRankScore ?? c.score ?? 0);
  const include = c.includeInFinalPlan === true;
  if ((include && score >= 8.8) || (include && score >= 22)) return {cls:'buy', label:'🟢 BUY', code:'BUY'};
  if (score >= 7.4 || score >= 18) return {cls:'wait', label:'🟡 WAIT', code:'WAIT'};
  if (quote && quote.changePercent > 6) return {cls:'wait', label:'🟡 過熱', code:'WAIT'};
  return {cls:'watch', label:'🔵 WATCH', code:'WATCH'};
}
function distToStop(currentPrice, stopLossPrice){
  const cp = Number(currentPrice), sl = Number(stopLossPrice);
  if (!isFinite(cp) || !isFinite(sl) || sl<=0) return {pct:null, cls:'dim', text:'資料不足'};
  const pct = (cp - sl) / cp * 100;
  const cls = pct < 2 ? 'danger' : pct < 5 ? 'warn' : 'safe';
  return {pct, cls, text:fmtPct(pct,1)};
}
/** v2 style upgrade：距停損 8 段 segment bar
 *  - 0–10% 線性映射；超過 10% 視為滿
 *  - 缺資料時 8 段全暗 */
function distBarHtml(pct){
  let on = 0;
  if (pct != null && isFinite(pct)) on = Math.max(0, Math.min(8, Math.round(Math.max(0,pct) / 10 * 8)));
  let html = '<span class="dist-seg">';
  for (let i=0;i<8;i++) html += `<i class="${i<on?'on':''}"></i>`;
  html += '</span>';
  return html;
}
function pickTopReasons(reasons, limit){
  const out = new Map();
  for (const raw of reasons||[]){
    if (!raw) continue;
    const r = String(raw).trim(); if (!r) continue;
    const u = r.toUpperCase();
    let p = 9;
    if (u.includes('REGIME_BLOCKED')||u.includes('MARKET_GRADE=C')||u.includes('DECISION_LOCK')||u.includes('PORTFOLIO')||u.includes('COOLDOWN')||u.includes('MAX_POSITIONS')||u.includes('PREMARKET_BIAS_ONLY')||u.includes('LATE_SESSION_FORCE_REST')) p=1;
    else if (u.includes('CODEX_NOT_READY')||u.includes('CODEX_MISSING')||u.startsWith('CODEX_')||u.includes('BUCKET')) p=2;
    else if (u.startsWith('VETO_')||u.includes('SCORE_DIVERGENCE')||u.includes('HARD_VETO')) p=3;
    else if (u.includes('PRICEGATE')||u.includes('PRICE_GATE')||u.includes('BELOWOPEN')||u.includes('BELOWPREVCLOSE')||u.includes('VWAP')||u.includes('WAIT_CONFIRMATION')) p=4;
    else if (u.includes('CASH_RESERVE')||u.includes('RISK_BLOCK')||u.includes('EXPOSURE_LIMIT')||u.includes('MIN_TRADE_AMOUNT')||u.includes('ZERO_SHARES')) p=5;
    else if (u.includes('AI_NOT_READY')||u.includes('AI_TIMEOUT')) p=6;
    if (!out.has(r) || out.get(r) > p) out.set(r,p);
  }
  return [...out.entries()].sort((a,b)=>a[1]-b[1]).slice(0,limit).map(e=>e[0]);
}

/* ════════════════════════════════════════════════════════════════
   COMPONENTS (11 reusable functions)
════════════════════════════════════════════════════════════════ */

/** 1. MobileHeader — 由 #mHeader 控制；setHeader(title) 切標題 */
function setHeader(title){ $('hdrTitle').textContent = title || ''; }

/** 2. MobileTabBar — 由 .tabbar 渲染 + hash routing；highlightTab(route) 切高亮 */
function highlightTab(route){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.r===route));
}

/** 3. DecisionHero — 給 fd/payload 渲染 hero */
function DecisionHero(fd){
  const wrap = el('section',{class:'hero',id:'hero'});
  if (!fd){
    wrap.dataset.d = 'ALERT';
    wrap.append(el('div',{class:'hero-inner',html:`
      <h1>🔴 <span>AI 未就緒</span></h1>
      <div class="reason">等待今日決策資料…</div>
      <div class="meta"><span>—</span><span class="mono">--:--</span></div>`}));
    return wrap;
  }
  const decision = (fd.decision||'').toUpperCase();
  const payload = safeJson(fd.payloadJson);
  const selectedCount = payload.selected_count ?? (payload.selected_stocks?.length || 0);
  const rejected = payload.rejected_reasons || [];

  let icon='⚫', title='REST', titleSuffix='';
  if (decision==='ENTER'){ icon='🟢'; title='ENTER'; titleSuffix=`（${selectedCount} 檔）`; }
  else if (decision==='WATCH'||decision==='WAIT'){ icon='🟡'; title='WAIT'; titleSuffix='（不追）'; }
  else if (decision==='REST'){ icon='⚫'; title='REST'; titleSuffix='（休息）'; }
  else if (decision==='PLAN'){ icon='🔵'; title='PLAN'; titleSuffix='（盤後規劃）'; }
  else { title=decision || '—'; }

  wrap.dataset.d = (decision==='WATCH'?'WAIT':decision) || 'REST';

  let reason = '';
  if (decision==='ENTER' && payload.selected_stocks?.length){
    reason = payload.selected_stocks[0].rationale || payload.selected_stocks[0].stockName || '';
  }
  reason = reason || fd.summary || '';
  reason = truncate(reason, 18);

  const inner = el('div',{class:'hero-inner'});
  const h1 = el('h1',{}, [
    el('span',{text:icon}),
    el('span',{text:' '+title}),
    el('span',{class:'count',text:titleSuffix}),
    el('span',{class:'chev',text: (decision==='WAIT'||decision==='WATCH'||decision==='REST') && rejected.length ? '▾ 看原因' : ''})
  ]);
  inner.append(h1);
  inner.append(el('div',{class:'reason',text: reason || (decision==='ENTER'?'可執行':'今日休息')}));
  inner.append(el('div',{class:'meta',html:`<span>來源 ${fd.sourceTaskType||'—'}</span><span class="mono">${HHmm(fd.createdAt)}</span>`}));
  if (rejected.length){
    const tb = el('div',{class:'topblocks'});
    tb.append(el('div',{html:'<span style="font-size:11px;color:var(--muted);margin-bottom:4px">主要阻擋原因</span>'}));
    const ol = el('ol');
    pickTopReasons(rejected, 2).forEach(r => ol.append(el('li',{text:truncate(r,30)})));
    tb.append(ol);
    inner.append(tb);
  }
  wrap.append(inner);
  wrap.addEventListener('click', () => {
    if (wrap.dataset.d==='WAIT' || wrap.dataset.d==='REST') {
      wrap.dataset.expanded = wrap.dataset.expanded==='true' ? 'false' : 'true';
    }
  });
  return wrap;
}

/** 4. AIStatusPill — 渲染三顆 pill */
function AIStatusPill(fd){
  const wrap = el('div',{class:'ai-status'});
  const pills = el('div',{class:'pills'});
  const ready = (fd?.aiStatus || '').toUpperCase();
  const fb = (fd?.fallbackReason || '').toUpperCase();
  let readyCls='warn', readyTxt='AI 未知';
  if (ready==='FULL_AI_READY'){ readyCls='ok'; readyTxt='AI READY'; }
  else if (ready==='PARTIAL_AI_READY'){ readyCls='warn'; readyTxt='AI PARTIAL'; }
  else if (ready==='AI_NOT_READY'){ readyCls='alert'; readyTxt='AI 未就緒'; }
  let claudeCls='ok', claudeTxt='Claude OK';
  let codexCls='ok', codexTxt='Codex OK';
  if (fb==='CODEX_MISSING' || ready==='PARTIAL_AI_READY'){ codexCls='alert'; codexTxt='Codex 未完成'; }
  if (fb==='AI_NOT_READY' || ready==='AI_NOT_READY'){ claudeCls='alert'; claudeTxt='Claude 未完成'; codexCls='alert'; codexTxt='Codex 未完成'; }
  if (fb==='AI_TIMEOUT'){ claudeCls='alert'; claudeTxt='AI Timeout'; codexCls='alert'; codexTxt='AI Timeout'; }
  pills.append(el('span',{class:'ai-pill '+readyCls,text:readyTxt}));
  pills.append(el('span',{class:'ai-pill '+claudeCls,text:claudeTxt}));
  pills.append(el('span',{class:'ai-pill '+codexCls,text:codexTxt}));
  wrap.append(pills);
  wrap.append(el('span',{class:'mono',text: HHmm(fd?.codexDoneAt || fd?.claudeDoneAt)}));
  return wrap;
}

/** 5. StatusBadge — 通用狀態 badge */
function StatusBadge(code, label){
  const map = {ENTER:'buy', BUY:'buy', WAIT:'wait', WATCH:'watch', PLAN:'plan',
               REST:'rest', SKIP:'skip', BLOCK:'stop', EXIT:'stop', SUCCESS:'buy',
               FAILED:'stop', PENDING:'wait', RUNNING:'watch'};
  const cls = map[String(code||'').toUpperCase()] || 'rest';
  return el('span',{class:'badge '+cls, text: label || code || '—'});
}

/** 6. RiskBadge — 距停損 % 對應風險文字 */
function RiskBadge(distancePct){
  if (distancePct==null) return el('span',{class:'badge skip',text:'未知'});
  const cls = distancePct<2?'stop':distancePct<5?'wait':'buy';
  const txt = distancePct<2?'高':distancePct<5?'中':'低';
  return el('span',{class:'badge '+cls,text:'風險 '+txt});
}

/** 7. StockActionCard — 候選股卡片（可展開） */
function StockActionCard(c, quote){
  const cur = quote?.currentPrice;
  const hint = classifyCandidate(c, quote);
  const dist = distToStop(cur, c.stopLossPrice);
  const score = c.finalRankScore ?? c.score;
  const rr = c.riskRewardRatio;

  const card = el('div',{class:'card a-card', dataset:{hint:hint.cls, sym:c.symbol||''}});
  card.append(el('div',{class:'row1'},[
    el('div',{},[ el('span',{class:'sym mono',text:c.symbol||''}),
                  el('span',{class:'name',text:c.stockName||''}) ]),
    el('span',{class:'badge '+hint.cls, text:hint.label})
  ]));
  if (quote){
    const pct = quote.changePercent;

/** 8. PositionCard — 持倉卡片 */
function PositionCard(p, quote){
  const cur = quote?.currentPrice ?? null;
  const cost = Number(p.avgCost);
  const pnlPct = (cur && isFinite(cur) && isFinite(cost) && cost>0) ? ((cur-cost)/cost*100) : null;
  const dist = distToStop(cur, p.stopLossPrice);
  const fillPct = dist.pct==null ? 0 : Math.max(0, Math.min(100, dist.pct*10));
  // 後端 reviewStatus 優先 -> 對應 risk class；否則 fallback dist.cls
  const rsUp = (p.reviewStatus||'').toUpperCase();
  let riskClass = 'rest';
  if (rsUp === 'EXIT') riskClass = 'danger';
  else if (rsUp === 'WEAKEN') riskClass = 'warn';
  else if (rsUp === 'STRONG') riskClass = 'safe';
  else riskClass = (dist.cls === 'dim' ? 'rest' : dist.cls);
  const card = el('div',{class:'p-card card', dataset:{sym:p.symbol||'', pid:p.id, risk:riskClass}});

  card.append(el('div',{class:'row1'},[
    el('div',{},[
      el('span',{class:'sym',text:p.symbol||''}),
      el('span',{class:'name',text:p.stockName||''})
    ]),
    el('span',{class:'pnl '+(pnlPct==null?'':pnlPct>=0?'up':'dn'),
               text: pnlPct==null?'—':fmtPct(pnlPct,2)})
  ]));
  card.append(el('div',{class:'info', text:
    `${fmt(p.qty)} 股 · 成本 ${fmtPrice(p.avgCost)}${cur?` · 現價 ${fmtPrice(cur)}`:''}`}));

  const stopRow = el('div',{class:'stop-row'},[
    el('span',{class:'label',text:'距停損'}),
    el('div',{class:'stop-bar '+(dist.cls==='dim'?'':dist.cls)},[
      el('span',{style:`width:${fillPct.toFixed(1)}%`})
    ]),
    el('span',{class:'dist '+dist.cls,text:dist.text})
  ]);
  card.append(stopRow);

  // 風險等級：後端 review_log 優先（STRONG/WEAKEN/EXIT），fallback 用距停損 % 推導
  let riskTxt, riskCls;
  const rs = (p.reviewStatus||'').toUpperCase();
  if (rs === 'STRONG'){ riskTxt='續抱'; riskCls='safe'; }
  else if (rs === 'WEAKEN'){ riskTxt='轉弱'; riskCls='warn'; }
  else if (rs === 'EXIT'){ riskTxt='出場'; riskCls='danger'; }
  else {
    riskTxt = dist.cls==='danger'?'高':dist.cls==='warn'?'中':dist.cls==='safe'?'低':'未知';
    riskCls = dist.cls;
  }
  const riskSrc = rs ? '<span style="color:var(--dim)">（後端 review）</span>' : '';
  card.append(el('div',{class:'risk',html:
    `風險：<b class="${riskCls}">${riskTxt}</b>${riskSrc} · 停損 <b class="mono">${fmtPrice(p.stopLossPrice)}</b> · TP1 <b class="mono">${fmtPrice(p.takeProfit1)}</b>`}));

  const acts = el('div',{class:'actions'});
  ['hold','add','reduce','exit'].forEach(act => {
    const labels = {hold:'續抱', add:'加碼', reduce:'減碼', exit:'出場'};
    const btn = el('button',{class:act, dataset:{act:act.toUpperCase()}, text:labels[act]});
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const a = btn.dataset.act;
      if (a==='HOLD') alert(`續抱 ${p.symbol} ${p.stockName||''}\n停損 ${fmtPrice(p.stopLossPrice)} · TP1 ${fmtPrice(p.takeProfit1)}\n持續監控，到價再決策。`);
      else confirm(`${labels[act.toLowerCase()]} ${p.symbol}？\n（系統不自動下單，請至券商手動執行；本次只記錄意圖）`);
    });
    acts.append(btn);
  });
  card.append(acts);

  const more = el('div',{class:'more'});
  more.append(el('div',{html:`策略：<b style="color:var(--ink)">${p.strategyType||'SETUP'}</b> · TP2 <b class="mono">${fmtPrice(p.takeProfit2)}</b>`}));
  more.append(el('div',{text:`建倉：${HHmmss(p.openedAt)} · ${truncate(p.note||'',40)}`}));
  if (p.reviewStatus){
    more.append(el('div',{html:
      `Review：<b style="color:var(--ink)">${p.reviewStatus}</b> · ${HHmm(p.reviewedAt)} · ${truncate(p.reviewReason||'',60)}`}));
  }
  card.append(more);
  card.addEventListener('click', e => {
    if (e.target.closest('.actions')) return;
    card.classList.toggle('exp');
  });
  return card;
}

/** 9. TimelineItem — 決策歷史 / 排程歷史 row */
function TimelineItem({decision, time, body, sub, latest, dataset}){
  return el('div', {class:'tl-item'+(latest?' latest':''), dataset:{d:(decision||'').toUpperCase(), ...dataset||{}}}, [
    el('div',{class:'head'},[
      el('span',{class:'badge '+badgeCls(decision), text: decision||'—'}),
      el('span',{class:'ts',text: time||''})
    ]),
    el('div',{class:'body',text: body||''}),
    sub ? el('div',{class:'sub',text: sub}) : null
  ]);
}
function badgeCls(decision){
  const map = {ENTER:'buy', BUY:'buy', WAIT:'wait', WATCH:'watch',
               PLAN:'plan', REST:'rest', BLOCK:'stop', SUCCESS:'buy',
               FAILED:'stop', PENDING:'wait', RUNNING:'watch'};
  return map[String(decision||'').toUpperCase()] || 'rest';
}

/** 10. MetricStrip — pnl / kpi 一排 */
function MetricStrip(items){
  const grid = el('div',{class:'metrics'});
  (items||[]).forEach(m => {
    const v = el('div',{class:'v '+(m.cls||'')+(m.mono===false?'':' mono'), text: m.value!=null?m.value:'—'});
    const d = el('div',{class:'metric'},[
      el('div',{class:'k',text:m.label||''}), v,
      m.sub ? el('div',{class:'sub',text:m.sub}) : null
    ]);
    grid.append(d);
  });
  return grid;
}

/** 11. CollapsibleSection — 可摺疊區 */
function CollapsibleSection(title, bodyNode, opts={}){
  const wrap = el('section',{class:'collapsible'+(opts.open?' open':'')});
  const head = el('div',{class:'head'},[
    el('span',{text:title}), el('span',{class:'chev',text:'▾'})
  ]);
  head.addEventListener('click', () => wrap.classList.toggle('open'));
  wrap.append(head);
  const body = el('div',{class:'body'});
  if (typeof bodyNode === 'string') body.innerHTML = bodyNode;
  else if (bodyNode) body.append(bodyNode);
  wrap.append(body);
  return wrap;
}

async function fetchCommon(){
  /* always-needed: dashboard + capital so AI status / hero sticky on every tab */
  const [dashboard, capital] = await Promise.all([
    safeFetch('/api/dashboard/current'),
    safeFetch('/api/capital/summary')
  ]);
  S.dashboard = dashboard;
  S.capital   = capital;
}
async function fetchOverview(){
  const [candidates, positions] = await Promise.all([
    safeFetch('/api/candidates/current'),
    safeFetch('/api/positions/open?size=10'),
  ]);
  S.candidates = Array.isArray(candidates) ? candidates : [];
  S.positions  = Array.isArray(positions) ? positions : [];
  await fetchQuotes();
}
async function fetchQuotes(){
  const syms = new Set();
  S.candidates?.forEach(c => c.symbol && syms.add(c.symbol));
  S.positions?.forEach(p => p.symbol && syms.add(p.symbol));
  if (!syms.size){ S.quotes = {}; return; }
  const csv = [...syms].join(',');
  const quotes = await safeFetch('/api/candidates/live-quotes?symbols='+encodeURIComponent(csv));
  S.quotes = {};
  if (Array.isArray(quotes)) for (const q of quotes) if (q?.symbol) S.quotes[q.symbol] = q;
}

  const cands = await safeFetch('/api/candidates/current');

        const payload = safeJson(r.payloadJson);
        let body, sub;
        if (active==='final'){
          body = truncate(r.summary || '—', 80);
          const sel = payload.selected_count ?? (payload.selected_stocks?.length||0);
          const rej = payload.rejected_count ?? (payload.rejected_reasons?.length||0);
          const rea = pickTopReasons(payload.rejected_reasons||[],1)[0];
          sub = `選 ${sel} 排 ${rej}${rea?' · '+truncate(rea,20):''}`;
        } else if (active==='hourly'){
          body = `${payload.market_grade||'—'} 級 · ${payload.market_phase||'—'} · 5min ${r.shouldRun5mMonitor?'ON':'OFF'}`;
          sub = `事件 ${r.triggerEvent||'NONE'} · ${HHmmss(r.createdAt)}`;
        } else {
          body = `monitor=${r.monitorMode||'—'} · grade=${payload.market_grade||'—'}`;
          sub = `事件 ${r.triggerEvent||'NONE'}${r.shouldNotify?' · 已通知':''}`;
        }
        wrap.append(TimelineItem({
          decision, time: HHmmss(r.createdAt || (r.gateTime?d+'T'+r.gateTime:null)),
          body, sub, latest:isLatest, dataset:{}
        }));
      });
    });
  }
  render();
};

/* 7. scheduler */
Views.scheduler = async () => {
  setHeader('排程');
  const app = $('app'); app.innerHTML = '';
  await fetchSchedulerTab();

  // Top metrics
  const jobs = S.schedulerJobs || [];
  const fail = jobs.filter(j => (j.lastStatus||'').toUpperCase()==='FAILED').length;
  const ok   = jobs.filter(j => (j.lastStatus||'').toUpperCase()==='SUCCESS').length;
  const enabled = jobs.filter(j => j.enabled).length;
  app.append(MetricStrip([
    {label:'啟用 job', value: String(enabled), sub:`共 ${jobs.length}`},
    {label:'最近成功', value: String(ok), cls:'up'},
    {label:'最近失敗', value: String(fail), cls: fail>0?'dn':'up'},
    {label:'已註冊 cron', value: String(S.scheduledTasks?.cron?.length||0)},
  ]));

  // Jobs list
  const sec = el('section',{class:'section'});
  sec.append(el('div',{class:'section-title',html:`Job 狀態 <span class="count">${jobs.length}</span>`}));
  if (!jobs.length) sec.append(el('div',{class:'empty',text:'無 scheduler 資料'}));
  else jobs.forEach(j => {
    const status = (j.lastStatus||'').toUpperCase();
    const badge = StatusBadge(status, status||'PENDING');
    const card = el('div',{class:'card sched-card'+(status==='FAILED'?' fail':''+(status==='PENDING'?' warn':''))},[
      el('div',{class:'name',text:`${j.display||j.jobName} ${j.enabled?'':'· 停用'}`}),
      badge,
      el('div',{class:'sub',text:`cron ${j.cron||'—'} · ${HHmmss(j.lastRunAt)} · ${j.lastDurationMs||'—'}ms`}),
    ]);
    if (j.lastMessage) card.append(el('div',{style:'font-size:11px;color:var(--muted);grid-column:1/-1;margin-top:4px',
      text: truncate(j.lastMessage, 70)}));
    sec.append(card);
  });
  app.append(sec);

  // Scheduled tasks (next execution)
  const stWrap = el('div');
  if (S.scheduledTasks?.cron?.length){
    const list = [...S.scheduledTasks.cron].sort((a,b)=>
      new Date(a.nextExecution.time)-new Date(b.nextExecution.time));
    list.forEach(t => {
      const cls = t.runnable.target.split('.').slice(-2,-1)[0];
      stWrap.append(el('div',{class:'tl-item',html:
        `<div class="head"><span class="badge watch">${cls}</span><span class="ts">${(t.expression||'').replace(/  +/g,' ')}</span></div>`+
        `<div class="body">下次：<span class="mono">${HHmmss(t.nextExecution.time)}</span> <span style="color:var(--muted);font-size:11px">${yyyymmdd(t.nextExecution.time)}</span></div>`
      }));
    });
  } else stWrap.append(el('div',{class:'empty',text:'actuator/scheduledtasks 未啟用'}));
  app.append(CollapsibleSection(`下次觸發排程 (${S.scheduledTasks?.cron?.length||0})`, stWrap, {open:false}));

  // FixedDelay
  if (S.scheduledTasks?.fixedDelay?.length){
    const fd = el('div');
    S.scheduledTasks.fixedDelay.forEach(t => {
      const cls = t.runnable.target.split('.').slice(-2,-1)[0];
      const lastTime = t.lastExecution?.time;
      const lastStatus = t.lastExecution?.status;
      fd.append(el('div',{class:'tl-item',html:
        `<div class="head"><span class="badge ${lastStatus==='SUCCESS'?'buy':'rest'}">${cls}</span><span class="ts">${t.interval/1000}s</span></div>`+
        `<div class="body">最後：<span class="mono">${HHmmss(lastTime)}</span> ${lastStatus||'—'}</div>`
      }));
    });
    app.append(CollapsibleSection(`fixedDelay (${S.scheduledTasks.fixedDelay.length})`, fd, {open:false}));
  }
};

/* ════════════════════════════════════════════════════════════════
   shared widget: capital strip
════════════════════════════════════════════════════════════════ */
function buildCapitalStrip(){
  const c = S.capital;
  const wrap = el('div',{class:'capital'});
  if (!c){ wrap.append(el('span',{text:'資金 unavailable'})); return wrap; }
  wrap.innerHTML = `<span>資金</span><span class="v mono">${fmt(c.totalAssets||c.totalEquity,0)}</span>`+
    `<span>現金比</span><span class="v mono">${c.cashRatio!=null?Math.round(c.cashRatio*100)+'%':'—'}</span>`+
    `<span>未實現</span><span class="v mono ${c.unrealizedPnl>=0?'up':'dn'}">${c.unrealizedPnl==null?'—':(c.unrealizedPnl>=0?'+':'')+fmt(c.unrealizedPnl,0)}</span>`+
    `<div class="theme-exposure" id="themeExposure"></div>`;
  // theme exposure aggregated from positions
  setTimeout(() => {
    const tw = wrap.querySelector('#themeExposure'); if (!tw) return;
    const ps = S.positions || [];
    if (!ps.length){ tw.innerHTML='<div style="color:var(--muted)">unavailable</div>'; return; }
    const map={}; let total=0;
    for (const p of ps){
      const cost=(Number(p.qty)||0)*(Number(p.avgCost)||0);
      if (!isFinite(cost)||cost<=0) continue;
      const tag=(p.themeTag||'').trim()||'未標題材';
      map[tag]=(map[tag]||0)+cost; total+=cost;
    }
    if (total<=0){ tw.innerHTML='<div style="color:var(--muted)">unavailable</div>'; return; }
    const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,3);
    tw.innerHTML = '<div style="font-size:10px;color:var(--muted);margin-bottom:3px">主題曝險 (top 3)</div>'+
      sorted.map(([t,c])=>{ const pct=c/total*100; const cls=pct>=40?'over':pct>=25?'warn':''; return `<div class="row"><span>${t}</span><b class="${cls}">${pct.toFixed(0)}%</b></div>`; }).join('');
  }, 0);
  wrap.addEventListener('click', () => wrap.classList.toggle('exp'));
  return wrap;
}

/* ════════════════════════════════════════════════════════════════
   router
════════════════════════════════════════════════════════════════ */
function currentRoute(){
  const h = (location.hash||'').replace(/^#\/?/, '').split('?')[0] || 'overview';
  return Views[h] ? h : 'overview';
}
async function navigate(){
  const r = currentRoute();
  highlightTab(r);
  $('app').innerHTML = '<div class="card skel" style="height:80px;margin:12px 16px"></div><div class="card skel" style="height:120px;margin:0 16px"></div>';
  try {
    await Views[r]();
    $('hdrTime').textContent = HHmmss(new Date().toISOString());
    S.lastFetchAt = Date.now();
  } catch(e){
    console.error('view error', r, e);
    $('app').innerHTML = `<div class="empty" style="margin:20px 16px">載入失敗：${e.message||e}</div>`;
  }
}
window.addEventListener('hashchange', navigate);
$('btnRefresh').addEventListener('click', navigate);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && Date.now() - (S.lastFetchAt||0) > 25000) navigate();
});

/* polling: 30s */
let _pollTimer = setInterval(() => {
  if (!document.hidden) navigate();
}, 30000);

/* boot: ensure default route */
if (!location.hash) location.hash = '#/overview';
else navigate();

/* ─── PWA service worker registration ───────────────────────── */
if ('serviceWorker' in navigator && location.protocol !== 'file:'){
  // 使用 load 事件避免影響首頁繪製
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(err => {
      console.warn('[sw] register failed', err);
    });
  });
}
